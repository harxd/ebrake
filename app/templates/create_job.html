<div class="two-column-layout">
    
    <!-- Left Column: File Browser cache -->
    <div class="panel card glass">
        <div class="panel-header-row">
            <h3 class="panel-title"><i class="fa-solid fa-folder-open"></i> Media Library</h3>
            <div class="browser-controls">
                <button class="btn btn-icon" 
                        hx-post="/api/media/sync" 
                        hx-swap="outerHTML" 
                        title="Rescan media directory">
                    <i class="fa-solid fa-rotate"></i>
                    <span>Update search db</span>
                </button>
            </div>
        </div>
        
        <!-- Search bar with HTMX delayed trigger -->
        <div class="search-box-wrapper">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" name="q" 
                   placeholder="Search files by name..." 
                   class="search-input"
                   hx-get="/api/media/search" 
                   hx-trigger="keyup changed delay:300ms" 
                   hx-target="#file-list"
                   hx-indicator="#search-loading">
            <span id="search-loading" class="htmx-indicator loader-inline"><i class="fa-solid fa-circle-notch fa-spin"></i></span>
        </div>
        
        <div class="file-browser-container" id="file-list" hx-get="/api/media/search" hx-trigger="load">
            <div class="loading-state">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <p>Loading files index...</p>
            </div>
        </div>
    </div>
    
    <!-- Right Column: Preset Configuration form -->
    <div class="panel card glass">
        <form hx-post="/api/jobs" hx-swap="none" class="job-creation-form">
            
            <div class="panel-header-row">
                <h3 class="panel-title"><i class="fa-solid fa-sliders"></i> Configure Encoding</h3>
            </div>
            
            <!-- Hidden input holding selected file absolute path -->
            <input type="hidden" name="input_path" id="input_path_field" required>
            
            <!-- Profile Category Selection -->
            <div class="profile-selection-row">
                <div class="form-group">
                    <label>Profile Category</label>
                    <select name="category" class="form-control"
                            hx-get="/api/profiles/presets-list" 
                            hx-target="#preset_select"
                            hx-trigger="change"
                            onchange="loadPresetFields()">
                        {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Profile Preset</label>
                    <select name="preset" id="preset_select" class="form-control"
                            onchange="loadPresetFields()">
                        {% for preset_name in presets %}
                            <option value="{{ preset_name }}">{{ preset_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <!-- Preset Overrides Title and container (moved directly under selections) -->
            <div class="panel-header-row" style="margin-top: 6px;">
                <h4 class="panel-title" style="font-size: 15px;"><i class="fa-solid fa-sliders"></i> Preset Overrides</h4>
            </div>
            
            <div id="profile-overrides-fields">
                {% if profile %}
                    {% include "components/profile_overrides.html" %}
                {% endif %}
            </div>
            
            <hr class="divider">
            
            <!-- Job Priority -->
            <div class="form-group">
                <label>Job Priority (Higher executes first)</label>
                <select name="priority" class="form-control">
                    <option value="0">Normal Priority (0)</option>
                    <option value="1">Medium Priority (1)</option>
                    <option value="5">High Priority (5)</option>
                    <option value="10">Urgent Priority (10)</option>
                </select>
            </div>
            
            <!-- Submit Button -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-large">
                    <i class="fa-solid fa-circle-play"></i> Add to Transcode Queue
                </button>
            </div>
            
        </form>
    </div>
    
</div>

<script>
    function loadPresetFields() {
        const catSelect = document.querySelector('select[name="category"]');
        const preSelect = document.getElementById('preset_select');
        
        if (catSelect && preSelect) {
            const category = catSelect.value;
            const preset = preSelect.value;
            if (category && preset) {
                // Fetch the overrides content and replace the fields container
                htmx.ajax('GET', `/api/profiles/select?category=${encodeURIComponent(category)}&preset=${encodeURIComponent(preset)}`, {
                    target: '#profile-overrides-fields',
                    swap: 'innerHTML'
                });
            }
        }
    }
</script>
