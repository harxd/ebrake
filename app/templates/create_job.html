<div class="two-column-layout">
    
    <!-- Left Column: File Browser cache -->
    {% include "components/file_browser.html" %}
    
    <!-- Right Column: Preset Configuration form -->
    <div class="panel card glass">
        <form id="job-creation-form" hx-post="/api/jobs" hx-swap="none" class="job-creation-form">
            
            <!-- Hidden input holding selected file absolute path -->
            <input type="hidden" name="input_path" id="input_path_field" required>
            
            <!-- Preset Category Selection -->
            <div class="profile-selection-row">
                <div class="form-group">
                    <label>Preset Category</label>
                    <select name="category" class="form-control"
                            hx-get="/api/presets/presets-list" 
                            hx-target="#preset_select"
                            hx-trigger="change"
                            onchange="loadPresetFields()">
                        {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Preset</label>
                    <select name="preset" id="preset_select" class="form-control"
                            onchange="loadPresetFields()">
                        {% for preset_name in presets %}
                            <option value="{{ preset_name }}">{{ preset_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <!-- Job Priority -->
            <div class="form-group" style="margin-top: 12px; margin-bottom: 24px; max-width: 300px;">
                <label>Job Priority (Higher executes first)</label>
                <select name="priority" class="form-control">
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                </select>
            </div>
            
            <!-- Preset Overrides Title and container -->
            <div class="panel-header-row" style="margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                <h4 class="panel-title" style="font-size: 15px;"><i class="fa-solid fa-sliders"></i> Preset Overrides</h4>
            </div>
            
            <div id="preset-overrides-fields">
                {% if preset %}
                    {% include "components/preset_overrides.html" %}
                {% endif %}
            </div>
            
        </form>
    </div>
    
</div>

{% if request.headers.get("HX-Request") == "true" %}
<!-- Page Action Bar OOB Swap -->
<div class="action-bar" id="page-action-bar" hx-swap-oob="true">
    <button type="submit" form="job-creation-form" class="btn btn-primary btn-large" id="job-submit-btn" disabled>
        <i class="fa-solid fa-circle-play"></i> Add to Transcode Queue
    </button>
</div>
{% endif %}

<script>
    function loadPresetFields() {
        const catSelect = document.querySelector('select[name="category"]');
        const preSelect = document.getElementById('preset_select');
        
        if (catSelect && preSelect) {
            const category = catSelect.value;
            const preset = preSelect.value;
            if (category && preset) {
                // Fetch the overrides content and replace the fields container
                htmx.ajax('GET', `/api/presets/select?category=${encodeURIComponent(category)}&preset=${encodeURIComponent(preset)}`, {
                    target: '#preset-overrides-fields',
                    swap: 'innerHTML'
                });
            }
        }
    }
</script>
