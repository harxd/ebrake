<div class="single-column-layout">
    
    <!-- Directory mappings read-only dashboard -->
    <div class="panel card glass">
        <h3 class="panel-title"><i class="fa-solid fa-folder-closed"></i> Active Folder Mappings</h3>
        <p class="section-desc">These are the directories mapped inside the application container. Modify environment variables or volume mounts to change them.</p>
        
        <div class="form-row">
            <div class="form-group">
                <label>Appdata Directory (Config & SQLite DB)</label>
                <input type="text" class="form-control" value="{{ appdata_path }}" readonly>
            </div>
            <div class="form-group">
                <label>Media Source Directory (/media mount)</label>
                <input type="text" class="form-control" value="{{ media_path }}" readonly>
            </div>
        </div>
    </div>
    
    <!-- Editable forms wrapper -->
    <div class="panel card glass" id="settings-form-wrapper">
        {% include "components/settings_form.html" %}
    </div>
    
</div>

{% if request.headers.get("HX-Request") == "true" %}
<!-- Hide Action Bar OOB Swap -->
<div class="action-bar" id="page-action-bar" hx-swap-oob="true" style="display: none;"></div>
{% endif %}
