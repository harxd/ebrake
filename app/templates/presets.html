<div class="two-column-layout">
    
    <!-- Left Column: Categories and Presets folder tree -->
    <div class="panel card glass">
        <div class="panel-header-row">
            <h3 class="panel-title"><i class="fa-solid fa-folder"></i> Preset Categories</h3>
        </div>
        
        <div id="presets-tree-root">
            {% include "components/presets_tree.html" %}
        </div>
    </div>
    
    <!-- Right Column: Preset Editor Workstation -->
    <div class="panel card glass" id="preset-config-container">
        <div class="empty-state">
            <i class="fa-solid fa-sliders text-muted"></i>
            <h3>No Preset Selected</h3>
            <p>Select a preset from the categories tree on the left to edit, or click "New Preset" under any folder category to create one from scratch.</p>
        </div>
    </div>
    
</div>

{% if request.headers.get("HX-Request") == "true" %}
<!-- Page Action Bar OOB Swap -->
<div class="action-bar" id="page-action-bar" hx-swap-oob="true">
    <button type="submit" form="preset-config-form" class="btn btn-primary btn-large" id="preset-save-btn" disabled>
        <i class="fa-solid fa-save"></i> Save Preset
    </button>
</div>
{% endif %}

<script>
    function createNewPresetForm(category) {
        htmx.ajax('GET', `/api/presets/config-fields?category=${encodeURIComponent(category)}`, {
            target: '#preset-config-container',
            swap: 'innerHTML'
        });
    }
</script>
