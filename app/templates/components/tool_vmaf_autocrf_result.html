<div class="result-card card glass-accent">
    <h4 class="result-title"><i class="fa-solid fa-gauge-high"></i> VMAF Auto-CRF Results</h4>
    
    <div class="metrics-grid-2">
        <div class="metric-box">
            <span class="metric-label">Optimal CRF</span>
            <span class="metric-value text-success">{{ optimal_crf }}</span>
        </div>
        <div class="metric-box">
            <span class="metric-label">Target VMAF</span>
            <span class="metric-value text-primary">{{ target_vmaf }}</span>
        </div>
    </div>
    
    <hr class="divider">
    
    <div class="vmaf-rating-banner rating-good">
        <i class="fa-solid fa-circle-info"></i>
        <span>
            Optimal CRF found: <strong>{{ optimal_crf }}</strong> using VMAF model <strong>{{ vmaf_model }}</strong>.
        </span>
    </div>
    
    <div class="stats-list">
        <div class="stats-row">
            <span>Codec:</span>
            <strong>{{ codec }}</strong>
        </div>
        <div class="stats-row">
            <span>Preset:</span>
            <strong>{{ preset }}</strong>
        </div>
    </div>
</div>
