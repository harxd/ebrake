<div id="settings" class="tab-content" style="padding: 2rem;">
    <div class="form-group">
        <label>Output Directory</label>
        <input class="input" id="setting-output_dir" placeholder="e.g. /media/transcoded" value="">
        <div style="font-size: 0.75rem; color: var(--dim); margin-top: 0.5rem;">
            Leave empty to save transcoded files in the same directory as the source.
        </div>
    </div>
    <button class="btn" onclick="saveSettings()" id="save-settings-btn">Save Settings</button>
</div>
