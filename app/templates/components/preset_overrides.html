<div class="override-grid">
    
    <!-- Container & Output Section -->
    <div class="panel-section">
        <h4 class="section-title"><i class="fa-solid fa-box-open"></i> Container & Output</h4>
        <div class="form-row">
            <div class="form-group">
                <label>Output Filename Suffix</label>
                <input type="text" name="output_suffix" class="form-control" value="{{ preset.output.output_suffix }}" placeholder="e.g. _transcoded">
            </div>
            
            <div class="form-group">
                <label>Container Format</label>
                <select name="container" class="form-control">
                    <option value="mkv" {% if preset.output.container == 'mkv' %}selected{% endif %}>MKV (Matroska)</option>
                    <option value="mp4" {% if preset.output.container == 'mp4' %}selected{% endif %}>MP4 (MPEG-4)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Video Configurations Section -->
    <div class="panel-section">
        <h4 class="section-title"><i class="fa-solid fa-video"></i> Video Encoding</h4>
        
        <div class="form-group">
            <label>Codec</label>
            <select name="codec" class="form-control" onchange="togglePresetOptions(this.value)">
                <option value="libsvtav1" {% if preset.video.codec == 'libsvtav1' %}selected{% endif %}>SVT-AV1 (libsvtav1)</option>
                <option value="libx265" {% if preset.video.codec == 'libx265' %}selected{% endif %}>H.265 (libx265)</option>
                <option value="libx264" {% if preset.video.codec == 'libx264' %}selected{% endif %}>H.264 (libx264)</option>
            </select>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Preset</label>
                <input type="text" name="preset_val" id="preset_input" class="form-control" value="{{ preset.video.preset }}" placeholder="e.g. 6 or fast">
            </div>
            
            <div class="form-group">
                <label>CRF (Constant Rate Factor)</label>
                <input type="number" name="crf" class="form-control" value="{{ preset.video.crf }}" min="0" max="51">
                <span class="input-tip">Ignored if Auto-VMAF is active</span>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>FPS (Frame Rate)</label>
                <select name="fps" class="form-control">
                    <option value="same as source" {% if preset.video.fps == 'same as source' %}selected{% endif %}>Same as Source</option>
                    <option value="23.976" {% if preset.video.fps == '23.976' %}selected{% endif %}>23.976 fps</option>
                    <option value="24" {% if preset.video.fps == '24' %}selected{% endif %}>24 fps</option>
                    <option value="29.97" {% if preset.video.fps == '29.97' %}selected{% endif %}>29.97 fps</option>
                    <option value="30" {% if preset.video.fps == '30' %}selected{% endif %}>30 fps</option>
                    <option value="50" {% if preset.video.fps == '50' %}selected{% endif %}>50 fps</option>
                    <option value="60" {% if preset.video.fps == '60' %}selected{% endif %}>60 fps</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>FPS Mode</label>
                <select name="fps_mode" class="form-control">
                    <option value="constant" {% if preset.video.fps_mode == 'constant' %}selected{% endif %}>Constant (CFR)</option>
                    <option value="variable" {% if preset.video.fps_mode == 'variable' %}selected{% endif %}>Variable (VFR)</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>Pixel Format</label>
            <select name="pixel_format" class="form-control">
                <option value="same as source" {% if preset.video.pixel_format == 'same as source' %}selected{% endif %}>Same as Source</option>
                <option value="yuv420p" {% if preset.video.pixel_format == 'yuv420p' %}selected{% endif %}>yuv420p (8-bit)</option>
                <option value="yuv420p10le" {% if preset.video.pixel_format == 'yuv420p10le' %}selected{% endif %}>yuv420p10le (10-bit HDR)</option>
            </select>
        </div>
    </div>
    
    <!-- Audio Configurations Section -->
    <div class="panel-section">
        <h4 class="section-title"><i class="fa-solid fa-volume-high"></i> Audio Encoding</h4>
        
        <div class="form-group">
            <label>Passthrough Audio Codecs (Copy without re-encoding)</label>
            <div class="checkbox-grid">
                {% for aud in ['aac', 'ac3', 'dts', 'eac3', 'truehd', 'flac', 'mp3'] %}
                    <label class="checkbox-container">
                        <input type="checkbox" name="passthrough_codecs" value="{{ aud }}" 
                               {% if aud in preset.audio.passthrough_codecs %}checked{% endif %}>
                        <span class="checkmark"></span>
                        <span>{{ aud | upper }}</span>
                    </label>
                {% endfor %}
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Fallback Audio Codec</label>
                <select name="fallback_codec" class="form-control">
                    <option value="aac" {% if preset.audio.fallback_codec == 'aac' %}selected{% endif %}>AAC (Default)</option>
                    <option value="ac3" {% if preset.audio.fallback_codec == 'ac3' %}selected{% endif %}>AC3</option>
                    <option value="flac" {% if preset.audio.fallback_codec == 'flac' %}selected{% endif %}>FLAC</option>
                    <option value="opus" {% if preset.audio.fallback_codec == 'opus' %}selected{% endif %}>Opus</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Fallback Bitrate</label>
                <select name="fallback_bitrate" class="form-control">
                    <option value="96000" {% if preset.audio.fallback_bitrate == 96000 %}selected{% endif %}>96 kbps</option>
                    <option value="128000" {% if preset.audio.fallback_bitrate == 128000 %}selected{% endif %}>128 kbps</option>
                    <option value="192000" {% if preset.audio.fallback_bitrate == 192000 or not preset.audio.fallback_bitrate %}selected{% endif %}>192 kbps</option>
                    <option value="256000" {% if preset.audio.fallback_bitrate == 256000 %}selected{% endif %}>256 kbps</option>
                    <option value="320000" {% if preset.audio.fallback_bitrate == 320000 %}selected{% endif %}>320 kbps</option>
                </select>
            </div>
        </div>
    </div>
    
    <!-- Subtitles Section -->
    <div class="panel-section">
        <h4 class="section-title"><i class="fa-solid fa-closed-captioning"></i> Subtitles</h4>
        
        <div class="form-group">
            <label>Subtitle Mode</label>
            <select name="sub_mode" class="form-control" onchange="toggleSubtitleTracks(this.value)">
                <option value="none" {% if preset.subtitles.mode == 'none' %}selected{% endif %}>None (Discard all tracks)</option>
                <option value="passthrough" {% if preset.subtitles.mode == 'passthrough' %}selected{% endif %}>Passthrough (Soft subtitles)</option>
                <option value="burn-in" {% if preset.subtitles.mode == 'burn-in' %}selected{% endif %}>Burn-in (Hardcode overlay)</option>
            </select>
        </div>
        
        <div class="form-group" id="burn_in_track_wrapper" {% if preset.subtitles.mode != 'burn-in' %}style="display:none;"{% endif %}>
            <label>Burn-in Track Selection</label>
            <select name="burn_in_track_select" class="form-control">
                <option value="default" {% if preset.subtitles.burn_in_track_select == 'default' %}selected{% endif %}>First Default Track</option>
                <option value="forced" {% if preset.subtitles.burn_in_track_select == 'forced' %}selected{% endif %}>First Forced Track</option>
                <option value="0">Track Index 0</option>
                <option value="1">Track Index 1</option>
                <option value="2">Track Index 2</option>
            </select>
        </div>
    </div>

    <!-- Extras & Optimizations Section -->
    <div class="panel-section">
        <h4 class="section-title"><i class="fa-solid fa-bolt"></i> Extras & Optimizations</h4>
        
        <div class="form-row">
            <div class="form-group">
                <label>Target VMAF (Auto-CRF Selection)</label>
                <input type="number" step="0.1" name="target_vmaf" class="form-control" value="{{ preset.optimization.target_vmaf }}" placeholder="e.g. 95.0 (0 to disable)">
                <span class="input-tip">Searches CRF range automatically to match quality.</span>
            </div>
            
            <div class="form-group">
                <label>VMAF Model</label>
                <select name="vmaf_model" class="form-control">
                    <option value="auto_near" {% if preset.optimization.vmaf_model == 'auto_near' %}selected{% endif %}>Auto Near (Detect 4K)</option>
                    <option value="auto_far" {% if preset.optimization.vmaf_model == 'auto_far' %}selected{% endif %}>Auto Far (Detect 4K)</option>
                    <option value="1080p" {% if preset.optimization.vmaf_model == '1080p' or not preset.optimization.vmaf_model %}selected{% endif %}>1080p (Standard / 3H)</option>
                    <option value="4k_near" {% if preset.optimization.vmaf_model == '4k_near' %}selected{% endif %}>4K Near (1.5H display height)</option>
                    <option value="4k_far" {% if preset.optimization.vmaf_model == '4k_far' %}selected{% endif %}>4K Far (3H display height / 1080p acuity)</option>
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>VMAF Min CRF</label>
                <input type="number" name="vmaf_min" class="form-control" value="{{ preset.optimization.vmaf_search_range[0] | default(18) }}">
            </div>
            
            <div class="form-group">
                <label>VMAF Max CRF</label>
                <input type="number" name="vmaf_max" class="form-control" value="{{ preset.optimization.vmaf_search_range[1] | default(30) }}">
            </div>
        </div>
        
        <div class="form-group checkbox-group">
            <label class="checkbox-container">
                <input type="checkbox" name="dedup" value="true" {% if preset.optimization.duplicate_frame_detection %}checked{% endif %}>
                <span class="checkmark"></span>
                <span>Enable FPS Deduplication (Drop identical frames)</span>
            </label>
        </div>
    </div>
    
</div>

<script>
    function togglePresetOptions(codec) {
        const presetInput = document.getElementById('preset_input');
        if (!presetInput) return;
        
        if (codec === 'libsvtav1') {
            presetInput.value = '6';
            presetInput.placeholder = 'e.g. 0 to 13 (6 is standard)';
        } else {
            presetInput.value = 'fast';
            presetInput.placeholder = 'e.g. fast, medium, slow';
        }
    }
    
    function toggleSubtitleTracks(mode) {
        const wrapper = document.getElementById('burn_in_track_wrapper');
        if (wrapper) {
            wrapper.style.display = mode === 'burn-in' ? 'block' : 'none';
        }
    }
</script>
