<div class="result-card card glass-accent">
    <h4 class="result-title"><i class="fa-solid fa-square-poll-horizontal"></i> Scan Results</h4>
    
    <div class="metrics-grid-2">
        <div class="metric-box">
            <span class="metric-label">Source FPS</span>
            <span class="metric-value text-primary">{{ results.source_fps | round(2) }}</span>
        </div>
        <div class="metric-box">
            <span class="metric-label">Unduplicated FPS</span>
            <span class="metric-value text-success">{{ results.unduplicated_fps | round(2) }}</span>
        </div>
    </div>
</div>
